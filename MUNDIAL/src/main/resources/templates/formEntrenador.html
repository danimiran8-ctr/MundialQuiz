<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Entrenador - Mundial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0e2a; color: white; font-family: Arial, sans-serif; }
        .navbar-custom { background-color: #0d1238; border-bottom: 2px solid #1a3a8f; padding: 12px 0; }
        .navbar-custom .nav-link { color: #ccd6f6 !important; font-weight: 600; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; padding: 8px 16px !important; }
        .navbar-custom .nav-link:hover { color: #4fc3f7 !important; }
        .navbar-brand-text { font-size: 22px; font-weight: 800; color: white; letter-spacing: 2px; }
        .navbar-brand-text span { color: #4fc3f7; }
        .page-header { background: linear-gradient(135deg, #0d1238 0%, #1b5e20 50%, #2e7d32 100%); padding: 40px 0; margin-bottom: 30px; }
        .page-header h2 { font-size: 32px; font-weight: 800; }
        .page-header h2 span { color: #69f0ae; }
        .section-badge { display: inline-block; background: #1b5e20; border: 1px solid #69f0ae; color: #69f0ae; font-size: 11px; font-weight: 700; letter-spacing: 2px; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; text-transform: uppercase; }
        .form-card { background: #0d1238; border: 1px solid #1a3a8f; border-radius: 12px; padding: 35px; }
        .form-label { color: #90caf9; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .form-control { background: #111840; border: 1px solid #1a3a8f; color: white; border-radius: 8px; padding: 10px 15px; }
        .form-control:focus { background: #111840; border-color: #69f0ae; color: white; box-shadow: 0 0 0 3px rgba(105,240,174,0.15); }
        .form-control::placeholder { color: #4a5a8a; }
        .form-text { color: #4a5a8a; font-size: 12px; }
        .required-mark { color: #e53935; margin-left: 3px; }
        .btn-guardar { background: linear-gradient(90deg, #1b5e20, #388e3c); border: none; border-radius: 20px; padding: 12px 35px; font-weight: 700; letter-spacing: 1px; color: white; font-size: 15px; }
        .btn-guardar:hover { opacity: 0.9; color: white; }
        .btn-cancelar { background: transparent; border: 1px solid #1a3a8f; border-radius: 20px; padding: 12px 35px; font-weight: 700; letter-spacing: 1px; color: #8899bb; font-size: 15px; }
        .btn-cancelar:hover { border-color: #69f0ae; color: #69f0ae; }
        footer { background: #0d1238; border-top: 1px solid #1a3a8f; padding: 20px 0; text-align: center; color: #4a5a8a; font-size: 13px; margin-top: 60px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="/"><span class="navbar-brand-text">⚽ <span>MUNDIAL</span></span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/verAsociacion">Asociación</a></li>
                <li class="nav-item"><a class="nav-link" href="/verClub">Club</a></li>
                <li class="nav-item"><a class="nav-link" href="/verCompeticion">Competición</a></li>
                <li class="nav-item"><a class="nav-link" href="/verEntrenador">Entrenador</a></li>
                <li class="nav-item"><a class="nav-link" href="/verJugador">Jugador</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <div class="section-badge">👔 Entrenador</div>
        <h2>Registrar <span>Nuevo Entrenador</span></h2>
        <p style="color:#a5d6a7; margin-top:8px;">Todos los campos son obligatorios</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="form-card">
                <form th:action="@{/verEntrenador/guardarEntrenador}"
                      th:object="${entrenador}"
                      method="post">

                    <div class="mb-4">
                        <label class="form-label">ID <span class="required-mark">*</span></label>
                        <input type="text" th:field="*{id}" class="form-control"
                               placeholder="Ej: ENT00001" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Nombre <span class="required-mark">*</span></label>
                        <input type="text" th:field="*{nombre}" class="form-control"
                               placeholder="Ej: Carlo" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Apellido <span class="required-mark">*</span></label>
                        <input type="text" th:field="*{apellido}" class="form-control"
                               placeholder="Ej: Ancelotti" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Edad <span class="required-mark">*</span></label>
                        <input type="number" th:field="*{edad}" class="form-control"
                               placeholder="Ej: 55" min="20" max="90" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Nacionalidad <span class="required-mark">*</span></label>
                        <input type="text" th:field="*{nacionalidad}" class="form-control"
                               placeholder="Ej: Italiano" required>
                    </div>

                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn btn-guardar">Guardar</button>
                        <a href="/verEntrenador" class="btn btn-cancelar">Cancelar</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<footer><p>⚽ Mundial — Sistema de Gestión de Fútbol &copy; 2026</p></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
