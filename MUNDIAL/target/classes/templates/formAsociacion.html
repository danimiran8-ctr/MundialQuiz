<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Asociación - Mundial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0e2a; color: white; font-family: Arial, sans-serif; }
        .navbar-custom { background-color: #0d1238; border-bottom: 2px solid #1a3a8f; padding: 12px 0; }
        .navbar-custom .nav-link { color: #ccd6f6 !important; font-weight: 600; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; padding: 8px 16px !important; }
        .navbar-custom .nav-link:hover { color: #4fc3f7 !important; }
        .navbar-brand-text { font-size: 22px; font-weight: 800; color: white; letter-spacing: 2px; }
        .navbar-brand-text span { color: #4fc3f7; }
        .page-header { background: linear-gradient(135deg, #0d1238 0%, #1a237e 50%, #0d47a1 100%); padding: 40px 0; margin-bottom: 30px; }
        .page-header h2 { font-size: 32px; font-weight: 800; }
        .page-header h2 span { color: #4fc3f7; }
        .section-badge { display: inline-block; background: #1a3a8f; border: 1px solid #4fc3f7; color: #4fc3f7; font-size: 11px; font-weight: 700; letter-spacing: 2px; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; text-transform: uppercase; }
        .form-card { background: #0d1238; border: 1px solid #1a3a8f; border-radius: 12px; padding: 35px; }
        .form-label { color: #90caf9; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .form-control { background: #111840; border: 1px solid #1a3a8f; color: white; border-radius: 8px; padding: 10px 15px; }
        .form-control:focus { background: #111840; border-color: #4fc3f7; color: white; box-shadow: 0 0 0 3px rgba(79,195,247,0.15); }
        .form-control::placeholder { color: #4a5a8a; }
        .form-text { color: #4a5a8a; font-size: 12px; }
        .required-mark { color: #e53935; margin-left: 3px; }
        .btn-guardar { background: linear-gradient(90deg, #1565c0, #0288d1); border: none; border-radius: 20px; padding: 12px 35px; font-weight: 700; letter-spacing: 1px; color: white; font-size: 15px; }
        .btn-guardar:hover { opacity: 0.9; color: white; }
        .btn-cancelar { background: transparent; border: 1px solid #1a3a8f; border-radius: 20px; padding: 12px 35px; font-weight: 700; letter-spacing: 1px; color: #8899bb; font-size: 15px; }
        .btn-cancelar:hover { border-color: #4fc3f7; color: #4fc3f7; }
        footer { background: #0d1238; border-top: 1px solid #1a3a8f; padding: 20px 0; text-align: center; color: #4a5a8a; font-size: 13px; margin-top: 60px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="/"><span class="navbar-brand-text">⚽ <span>MUNDIAL</span></span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/verAsociacion">Asociación</a></li>
                <li class="nav-item"><a class="nav-link" href="/verClub">Club</a></li>
                <li class="nav-item"><a class="nav-link" href="/verCompeticion">Competición</a></li>
                <li class="nav-item"><a class="nav-link" href="/verEntrenador">Entrenador</a></li>
                <li class="nav-item"><a class="nav-link" href="/verJugador">Jugador</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <div class="section-badge">🏛️ Asociación</div>
        <h2>Registrar <span>Nueva Asociación</span></h2>
        <p style="color:#90caf9; margin-top:8px;">Todos los campos son obligatorios</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="form-card">
                <form th:action="@{/verAsociacion/guardarAsociacion}"
                      th:object="${asociacion}"
                      method="post"
                      onsubmit="return validarFormulario()">

                    <div class="mb-4">
                        <label class="form-label">ID <span class="required-mark">*</span></label>
                        <input type="text"
                               th:field="*{id}"
                               class="form-control"
                               id="idAsociacion"
                               placeholder="Ej: FIFA00001"
                               minlength="8"
                               maxlength="10"
                               required>
                        <div class="form-text">Entre 8 y 10 caracteres (sin espacios)</div>
                        <div id="errorId" style="color:#e53935; font-size:12px; display:none;">
                            El ID debe tener entre 8 y 10 caracteres
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Nombre <span class="required-mark">*</span></label>
                        <input type="text"
                               th:field="*{nombre}"
                               class="form-control"
                               placeholder="Ej: FIFA"
                               required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">País <span class="required-mark">*</span></label>
                        <input type="text"
                               th:field="*{pais}"
                               class="form-control"
                               placeholder="Ej: Suiza"
                               required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Presidente <span class="required-mark">*</span></label>
                        <input type="text"
                               th:field="*{presidente}"
                               class="form-control"
                               placeholder="Ej: Gianni Infantino"
                               required>
                    </div>

                    <div class="d-flex gap-3 mt-4">
						<button type="submit" class="btn btn-guardar">
					  		<span th:if="${asociacion.id == null or asociacion.id == ''}">💾 Guardar</span>
						 	<span th:if="${asociacion.id != null and asociacion.id != ''}">✏️ Actualizar</span>
						</button>
						<a href="/verAsociacion" class="btn btn-cancelar">Cancelar</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<footer><p>⚽ Mundial — Sistema de Gestión de Fútbol &copy; 2026</p></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function validarFormulario() {
    const id = document.getElementById('idAsociacion').value.trim();
    const errorId = document.getElementById('errorId');
    if (id.length < 8 || id.length > 10) {
        errorId.style.display = 'block';
        document.getElementById('idAsociacion').style.borderColor = '#e53935';
        return false;
    }
    errorId.style.display = 'none';
    return true;
}
document.getElementById('idAsociacion').addEventListener('input', function() {
    const errorId = document.getElementById('errorId');
    if (this.value.length >= 8 && this.value.length <= 10) {
        errorId.style.display = 'none';
        this.style.borderColor = '#4fc3f7';
    } else {
        this.style.borderColor = '#e53935';
    }
});
</script>
</body>
</html>
